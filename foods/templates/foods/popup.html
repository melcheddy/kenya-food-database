<div id="nutrientModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">📊 Nutrition Results</h3>
            <button class="close-modal" onclick="closeModal()">×</button>
        </div>
        <div id="modalBody" style="max-height: 70vh; overflow-y: auto;">
            <div class="loading">Loading...</div>
        </div>
    </div>
</div>

<style>
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.6);
        z-index: 1000;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(4px);
    }
    
    .modal.active {
        display: flex;
    }
    
    .modal-content {
        background: white;
        max-width: 600px;
        width: 90%;
        max-height: 85vh;
        border-radius: 28px;
        padding: 0;
        overflow: hidden;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        animation: slideUp 0.3s ease;
    }
    
    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1.25rem 1.5rem;
        background: #2c5e2e;
        color: white;
    }
    
    .modal-header h3 {
        margin: 0;
        font-size: 1.25rem;
        font-weight: 600;
    }
    
    .close-modal {
        background: none;
        border: none;
        font-size: 28px;
        cursor: pointer;
        color: white;
        opacity: 0.8;
        transition: opacity 0.2s;
    }
    
    .close-modal:hover {
        opacity: 1;
    }
    
    .greeting {
        background: #e8f0e8;
        padding: 1rem;
        border-radius: 16px;
        margin-bottom: 1rem;
        text-align: center;
    }
    
    .greeting h2 {
        color: #2c5e2e;
        margin: 0;
        font-size: 1.3rem;
    }
    
    .loading {
        text-align: center;
        padding: 3rem;
        color: #666;
    }
    
    .nutrient-tabs {
        display: flex;
        background: #f8f9fa;
        border-bottom: 1px solid #e9ecef;
        overflow-x: auto;
    }
    
    .nutrient-tab {
        padding: 0.75rem 1.25rem;
        cursor: pointer;
        font-weight: 500;
        color: #666;
        border-bottom: 3px solid transparent;
        transition: all 0.2s;
        white-space: nowrap;
    }
    
    .nutrient-tab.active {
        color: #2c5e2e;
        border-bottom-color: #2c5e2e;
    }
    
    .tab-content {
        display: none;
        padding: 1.25rem;
    }
    
    .tab-content.active {
        display: block;
    }
    
    .nutrient-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.75rem;
    }
    
    .nutrient-item {
        background: #f8f9fa;
        padding: 0.75rem;
        border-radius: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    
    .nutrient-name {
        font-weight: 500;
        color: #495057;
        font-size: 0.85rem;
    }
    
    .nutrient-value {
        font-weight: 700;
        color: #2c5e2e;
        font-size: 0.9rem;
    }
    
    .rda-bar {
        margin-top: 4px;
        height: 4px;
        background: #e9ecef;
        border-radius: 2px;
        overflow: hidden;
    }
    
    .rda-fill {
        height: 100%;
        background: #2c5e2e;
        width: 0%;
        transition: width 0.3s;
    }
    
    .comparison-table {
        width: 100%;
        border-collapse: collapse;
    }
    
    .comparison-table th,
    .comparison-table td {
        padding: 0.75rem;
        text-align: left;
        border-bottom: 1px solid #e9ecef;
    }
    
    .comparison-table th {
        background: #f8f9fa;
        font-weight: 600;
    }
    
    .winner-badge {
        background: #28a745;
        color: white;
        padding: 2px 8px;
        border-radius: 20px;
        font-size: 0.7rem;
        margin-left: 8px;
    }
    
    .share-buttons {
        display: flex;
        gap: 0.75rem;
        justify-content: center;
        margin-top: 1.5rem;
        padding-top: 1rem;
        border-top: 1px solid #e9ecef;
    }
    
    .share-btn {
        padding: 0.5rem 1rem;
        border-radius: 40px;
        text-decoration: none;
        font-size: 0.8rem;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        border: none;
    }
    
    .share-wa { background: #25D366; color: white; }
    .share-fb { background: #1877F2; color: white; }
    .share-tw { background: #000000; color: white; }
    .share-copy { background: #6c757d; color: white; }
    
    .insight-box {
        background: #fff3cd;
        padding: 1rem;
        border-radius: 12px;
        margin-top: 1rem;
        border-left: 4px solid #ffc107;
    }
    
    @media (max-width: 500px) {
        .nutrient-grid {
            grid-template-columns: 1fr;
        }
    }
</style>

<script>
    function openModal() {
        document.getElementById('nutrientModal').classList.add('active');
        document.body.style.overflow = 'hidden';
    }
    
    function closeModal() {
        document.getElementById('nutrientModal').classList.remove('active');
        document.body.style.overflow = '';
    }
    
    function showNutrientTab(tabId) {
        document.querySelectorAll('.nutrient-tab').forEach(tab => {
            tab.classList.remove('active');
        });
        document.querySelectorAll('.tab-content').forEach(content => {
            content.classList.remove('active');
        });
        document.querySelector(`.nutrient-tab[data-tab="${tabId}"]`).classList.add('active');
        document.getElementById(`tab-${tabId}`).classList.add('active');
    }
    
    function shareResults(platform, text, url) {
        if (platform === 'whatsapp') {
            window.open(`https://wa.me/?text=${encodeURIComponent(text + ' ' + url)}`, '_blank');
        } else if (platform === 'facebook') {
            window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank');
        } else if (platform === 'twitter') {
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank');
        } else if (platform === 'copy') {
            navigator.clipboard.writeText(text + ' ' + url);
            alert('Link copied!');
        }
    }
</script>
