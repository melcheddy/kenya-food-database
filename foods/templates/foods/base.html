<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Kenya Food Database{% endblock %}</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation Bar */
        .navbar {
            background: #2c3e50;
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 100%;
        }

        .logo {
            color: white;
            font-size: 20px;
            font-weight: 600;
            text-decoration: none;
            letter-spacing: -0.3px;
        }

        /* Hamburger Menu Button */
        .hamburger {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 1001;
        }

        .hamburger span {
            display: block;
            width: 24px;
            height: 3px;
            background: white;
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 6px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -6px);
        }

        /* Mobile Menu */
        .mobile-menu {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            background: #2c3e50;
            padding: 20px;
            transform: translateY(-150%);
            transition: transform 0.3s ease;
            z-index: 999;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border-top: 1px solid #34495e;
        }

        .mobile-menu.active {
            transform: translateY(0);
        }

        .mobile-menu a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px 20px;
            font-size: 18px;
            border-bottom: 1px solid #34495e;
            transition: background 0.2s;
        }

        .mobile-menu a:active {
            background: #34495e;
        }

        .mobile-menu a:last-child {
            border-bottom: none;
        }

        .mobile-menu a.active {
            background: #667eea;
            border-radius: 8px;
        }

        .main-content {
            flex: 1;
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
            width: 100%;
            transition: opacity 0.3s;
        }

        .main-content.menu-open {
            opacity: 0.5;
            pointer-events: none;
        }

        footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 1.5rem;
            margin-top: 2rem;
            font-size: 0.9rem;
        }

        /* Overlay */
        .menu-overlay {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 998;
            display: none;
        }

        .menu-overlay.active {
            display: block;
        }

        @media (max-width: 768px) {
            .main-content {
                margin: 1rem auto;
                padding: 0 0.75rem;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{% url 'home' %}" class="logo">🇰🇪 Kenya Food DB</a>
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobileMenu">
        <a href="{% url 'home' %}" {% if request.path == '/' %}class="active"{% endif %}>🏠 Home</a>
        <a href="{% url 'search' %}" {% if 'search' in request.path %}class="active"{% endif %}>🔍 Search Foods</a>
        <a href="{% url 'calculator' %}" {% if 'calculator' in request.path %}class="active"{% endif %}>🧮 Calculator</a>
        <a href="{% url 'recall' %}" {% if 'recall' in request.path %}class="active"{% endif %}>📋 24hr Recall</a>
        <a href="{% url 'compare' %}" {% if 'compare' in request.path %}class="active"{% endif %}>🔍 Compare Foods</a>
        <a href="/admin/" {% if 'admin' in request.path %}class="active"{% endif %}>⚙️ Admin</a>
    </div>

    <!-- Overlay -->
    <div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>

    <div class="main-content" id="mainContent">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <p>© 2026 Kenya Food Database • Based on KFCT 2018</p>
    </footer>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('mobileMenu');
            const overlay = document.getElementById('menuOverlay');
            const hamburger = document.getElementById('hamburgerBtn');
            const mainContent = document.getElementById('mainContent');
            
            menu.classList.toggle('active');
            overlay.classList.toggle('active');
            hamburger.classList.toggle('active');
            mainContent.classList.toggle('menu-open');
        }

        function closeMenu() {
            const menu = document.getElementById('mobileMenu');
            const overlay = document.getElementById('menuOverlay');
            const hamburger = document.getElementById('hamburgerBtn');
            const mainContent = document.getElementById('mainContent');
            
            menu.classList.remove('active');
            overlay.classList.remove('active');
            hamburger.classList.remove('active');
            mainContent.classList.remove('menu-open');
        }

        // Close menu when clicking a link
        document.querySelectorAll('.mobile-menu a').forEach(link => {
            link.addEventListener('click', closeMenu);
        });
    </script>
</body>
</html>
